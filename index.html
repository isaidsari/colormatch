<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <title>Color Match</title>
        <link rel="icon" href="./img/icon/icon128.png">
        <link rel="apple-touch-icon" href="./img/icon/icon128.png">
        <link rel="manifest" href="./manifest.json">
        <meta name="theme-color" content="#141414">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./style.css">
        <script type="module" src="./dist/script.js" defer></script>
        <script>
                if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.register('./sw.js');
                }
        </script>
</head>

<body>
        <canvas id="bg-canvas"></canvas>
        <div class="wrapper">
                <header class="header">
                        <div class="header-item">
                                <span class="header-label">SCORE</span>
                                <span class="header-value" id="score">0</span>
                        </div>
                        <div class="header-item title">
                                <span class="game-title">COLOR MATCH</span>
                        </div>
                        <div class="header-item">
                                <span class="header-label">BEST</span>
                                <span class="header-value" id="high-score">0</span>
                        </div>
                </header>

                <div class="game-container">
                        <canvas id="canvas"></canvas>
                </div>

                <div class="action-row">
                        <button class="restart-btn" id="restart">&#8635; NEW GAME</button>
                        <button class="mute-btn" id="mute" aria-label="Toggle sound">&#9834; on</button>
                </div>
        </div>
</body>

</html>
